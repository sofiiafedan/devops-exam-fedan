name: Deploy Environments (Dev & Release)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Build and Deploy
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_IP }} << 'EOF'
            echo "1. Створюємо маніфести для двох середовищ..."
            cat << 'YAML' > dual-env.yaml
            # --- DEV ENVIRONMENT (8002) ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-dev
            spec:
              replicas: 1
              selector:
                matchLabels:
                  env: dev
              template:
                metadata:
                  labels:
                    env: dev
                spec:
                  containers:
                  - name: exam-app
                    image: exam-app:dev
                    imagePullPolicy: Never
                    ports:
                    - containerPort: 8000
                    env:
                    - name: ENV
                      value: "DEVELOP"
                    - name: ENVIRONMENT
                      value: "DEVELOP"
                    - name: VERSION
                      value: "DEVELOP"
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: svc-dev
            spec:
              type: NodePort
              selector:
                env: dev
              ports:
                - port: 8000
                  nodePort: 30002
            ---
            # --- RELEASE ENVIRONMENT (8003) ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-release
            spec:
              replicas: 1
              selector:
                matchLabels:
                  env: release
              template:
                metadata:
                  labels:
                    env: release
                spec:
                  containers:
                  - name: exam-app
                    image: exam-app:release
                    imagePullPolicy: Never
                    ports:
                    - containerPort: 8000
                    env:
                    - name: ENV
                      value: "1.0.0"
                    - name: ENVIRONMENT
                      value: "1.0.0"
                    - name: VERSION
                      value: "1.0.0"
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: svc-release
            spec:
              type: NodePort
              selector:
                env: release
              ports:
                - port: 8000
                  nodePort: 30003
            YAML

            echo "2. Налаштовуємо Docker та код..."
            eval $(minikube docker-env)
            rm -rf devops-exam-pt2
            git clone https://github.com/YulianSalo/devops-exam-pt2.git
            
            echo "3. Збираємо образ Release (з main)..."
            cd devops-exam-pt2
            git checkout main 2>/dev/null || git checkout master 2>/dev/null || true
            docker build -t exam-app:release .
            
            echo "4. Збираємо образ Dev (з develop)..."
            git fetch --all
            git checkout develop 2>/dev/null || git checkout dev 2>/dev/null || true
            docker build -t exam-app:dev .
            
            echo "5. Запускаємо в Kubernetes..."
            cd ..
            kubectl apply -f dual-env.yaml

            echo "6. Налаштовуємо Nginx..."
            MINIKUBE_IP=$(minikube ip)
            cat << CONF > /etc/nginx/sites-available/dual-app
            server {
                listen 8002;
                location / { proxy_pass http://$MINIKUBE_IP:30002; }
            }
            server { 
                listen 8003;
                location / { proxy_pass http://$MINIKUBE_IP:30003; }
            }
            CONF
            
            ln -sf /etc/nginx/sites-available/dual-app /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            systemctl restart nginx
          EOF
