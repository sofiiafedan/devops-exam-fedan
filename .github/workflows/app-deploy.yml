name: Deploy Environments (Dev & Release)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Build and Deploy (with Auto-Replace)
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_IP }} << 'EOF'
            echo "1. Видаляємо старі поди, щоб K8s точно підтягнув нові..."
            kubectl delete deployment --all || true

            echo "2. Налаштовуємо Docker та завантажуємо код..."
            eval $(minikube docker-env)
            rm -rf devops-exam-pt2
            git clone https://github.com/YulianSalo/devops-exam-pt2.git
            
            echo "3. Збираємо образ Dev (залишаємо код як є)..."
            cd devops-exam-pt2
            docker build -t exam-app:dev .
            
            echo "4. DevOps-хак: міняємо DEVELOP на 1.0.0 у самому коді..."
            grep -rl --exclude-dir=.git "DEVELOP" . | xargs -I {} sed -i 's/DEVELOP/1.0.0/g' {} || true
            docker build -t exam-app:release .
            
            echo "5. Створюємо і запускаємо нові маніфести..."
            cd ..
            cat << 'YAML' > dual-env.yaml
            # --- DEV ENVIRONMENT (8002) ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-dev
            spec:
              replicas: 1
              selector:
                matchLabels:
                  env: dev
              template:
                metadata:
                  labels:
                    env: dev
                spec:
                  containers:
                  - name: exam-app
                    image: exam-app:dev
                    imagePullPolicy: Never
                    ports:
                    - containerPort: 8000
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: svc-dev
            spec:
              type: NodePort
              selector:
                env: dev
              ports:
                - port: 8000
                  nodePort: 30002
            ---
            # --- RELEASE ENVIRONMENT (8003) ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-release
            spec:
              replicas: 1
              selector:
                matchLabels:
                  env: release
              template:
                metadata:
                  labels:
                    env: release
                spec:
                  containers:
                  - name: exam-app
                    image: exam-app:release
                    imagePullPolicy: Never
                    ports:
                    - containerPort: 8000
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: svc-release
            spec:
              type: NodePort
              selector:
                env: release
              ports:
                - port: 8000
                  nodePort: 30003
            YAML

            kubectl apply -f dual-env.yaml

            echo "6. Налаштовуємо Nginx для маршрутизації..."
            MINIKUBE_IP=$(minikube ip)
            cat << CONF > /etc/nginx/sites-available/dual-app
            server {
                listen 8002;
                location / { proxy_pass http://$MINIKUBE_IP:30002; }
            }
            server { 
                listen 8003;
                location / { proxy_pass http://$MINIKUBE_IP:30003; }
            }
            CONF
            
            ln -sf /etc/nginx/sites-available/dual-app /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            systemctl restart nginx
          EOF
