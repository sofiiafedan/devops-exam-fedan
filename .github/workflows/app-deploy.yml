name: Deploy Environments (Dev & Release)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy Dev and Release
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.DROPLET_IP }} << 'EOF'
            # 1. Створюємо маніфести для двох середовищ
            cat << 'YAML' > dual-env.yaml
            # --- DEV ENVIRONMENT (8002) ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-dev
            spec:
              replicas: 1
              selector:
                matchLabels:
                  env: dev
              template:
                metadata:
                  labels:
                    env: dev
                spec:
                  containers:
                  - name: exam-app
                    image: exam-app:v1
                    imagePullPolicy: Never
                    ports:
                    - containerPort: 8000
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: svc-dev
            spec:
              type: NodePort
              selector:
                env: dev
              ports:
                - port: 8000
                  nodePort: 30002
            ---
            # --- RELEASE ENVIRONMENT (8003) ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-release
            spec:
              replicas: 1
              selector:
                matchLabels:
                  env: release
              template:
                metadata:
                  labels:
                    env: release
                spec:
                  containers:
                  - name: exam-app
                    image: exam-app:v1
                    imagePullPolicy: Never
                    ports:
                    - containerPort: 8000
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: svc-release
            spec:
              type: NodePort
              selector:
                env: release
              ports:
                - port: 8000
                  nodePort: 30003
            YAML

            # 2. Перевіряємо Minikube та образ
            eval $(minikube docker-env)
            # Білдимо образ, якщо його ще немає
            docker inspect exam-app:v1 >/dev/null 2>&1 || (git clone https://github.com/YulianSalo/devops-exam-pt2.git && cd devops-exam-pt2 && docker build -t exam-app:v1 .)
            
            # 3. Запускаємо в Kubernetes
            kubectl apply -f dual-env.yaml

            # 4. Налаштовуємо Nginx для обох портів
            MINIKUBE_IP=$(minikube ip)
            cat << CONF > /etc/nginx/sites-available/dual-app
            server {
                listen 8002;
                location / { proxy_pass http://$MINIKUBE_IP:30002; }
            }
            server { listen 8003;
                location / { proxy_pass http://$MINIKUBE_IP:30003; }
            }
            CONF
            
            ln -sf /etc/nginx/sites-available/dual-app /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            systemctl restart nginx
          EOF
